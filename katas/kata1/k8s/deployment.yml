apiVersion: v1
kind: Namespace
metadata:
  name: kata1

---
# This is the abstraction of the microservice A, which is just one container. It will be duplicated to have 2 replicas.
# It will be exposed to the network through a service, which is the abstraction of the network. 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: kata1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
      - name: service-a
        image: service-a:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080

---
# This is the abstraction of the network. It allows pods to communicate with each other because it provides a stable DNS
# (and load balancing) for the pods. It also allows external traffic to access the pods.

# If I remove it, it would be impractical for the pods to talk to each other cause they would need to know the IP address
# of the other pod. This is unrealistic cause they can die and be created again with a different IP without any notice.
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: kata1
spec:
  type: ClusterIP
  selector:
    app: service-a
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: kata1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: service-b
        image: service-b:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: service-b
  namespace: kata1
spec:
  type: ClusterIP
  selector:
    app: service-b
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---
# PersistentVolumeClaim for PostgreSQL data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: kata1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kata1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16 # This pulls automatically from Docker Hub as it's a public image
        # I dont have to create a dockerfile for it. I use the official one and k8s knows how to pull it.
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "kata_db"
        - name: POSTGRES_USER
          value: "kata_user"
        - name: POSTGRES_PASSWORD
          value: "kata_password"  # TODO: Use Secret instead in production
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kata1
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432

