apiVersion: v1
kind: Namespace
metadata:
  name: kata1

---
# This is the abstraction of the microservice A, which is just one container. It will be duplicated to have 2 replicas.
# It will be exposed to the network through a service, which is the abstraction of the network. 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: kata1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
      - name: service-a
        image: your-registry/service-a:latest
        ports:
        - containerPort: 8080

---
# This is the abstraction of the network. It allows pods to communicate with each other because it provides a stable DNS
# (and load balancing) for the pods. It also allows external traffic to access the pods.

# If I remove it, it would be impractical for the pods to talk to each other cause they would need to know the IP address
# of the other pod. This is unrealistic cause they can die and be created again with a different IP without any notice.
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: kata1
spec:
  type: ClusterIP
  selector:
    app: service-a
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: kata1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: service-b
        image: your-registry/service-b:latest
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: service-b
  namespace: kata1
spec:
  type: ClusterIP
  selector:
    app: service-b
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080