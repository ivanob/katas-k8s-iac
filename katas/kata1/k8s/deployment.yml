apiVersion: v1
kind: Namespace
metadata:
  name: kata1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: kata1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
      - name: service-a
        image: your-registry/service-a:latest
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: kata1
spec:
  type: ClusterIP
  selector:
    app: service-a
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
