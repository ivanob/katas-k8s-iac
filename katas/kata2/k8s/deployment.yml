apiVersion: v1
kind: Namespace
metadata:
  name: kata2

---
# Ingress - Routes external traffic to services
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kata2-ingress
  namespace: kata2
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: service-a
            port:
              number: 80